apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-agent
  namespace: default
  labels:
    app: infra-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-agent
  template:
    metadata:
      labels:
        app: infra-agent
    spec:
      serviceAccountName: infra-agent-sa
      containers:
      - name: infra-agent
        image: ubaidmundewadidocker/devops-agents:latest # Replace with your pushed image tag
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        # Load Gemini API Key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: infra-agent-secrets
              key: gemini-api-key
        
        # Load AWS Credentials (rely on these ONLY if not using IRSA)
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: infra-agent-secrets
              key: aws-access-key-id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: infra-agent-secrets
              key: aws-secret-access-key
              optional: true
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        
        # Volume mount for the terraform workspace folder to ensure write access and stability
        volumeMounts:
        - name: terraform-workspace
          mountPath: /app/terraform
          
      volumes:
      - name: terraform-workspace
        emptyDir: {}
