apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: infra-agent
  namespace: default
  labels:
    app: infra-agent
spec:
  # Set Agent type to BYO (Bring Your Own image running our custom code)
  type: BYO
  
  byo:
    deployment:
      # The custom container image built with the python server & terraform CLI
      image: ubaidmundewadidocker/devops-agents:latest
      imagePullPolicy: Always
      
      # Bind the EKS ServiceAccount for keyless AWS IAM permissions (IRSA)
      serviceAccountName: infra-agent-sa
      
      # Inject the required Gemini API Key from the secret
      env:
      - name: GEMINI_API_KEY
        valueFrom:
          secretKeyRef:
            name: infra-agent-secrets
            key: gemini-api-key
      - name: AWS_MCP_SSE_URL
        valueFrom:
          secretKeyRef:
            name: infra-agent-secrets
            key: aws-mcp-sse-url
            optional: true
      - name: AWS_MCP_SSE_TOKEN
        valueFrom:
          secretKeyRef:
            name: infra-agent-secrets
            key: aws-mcp-sse-token
            optional: true
            
      # Mount a writable emptyDir volume for the Terraform workspace
      volumeMounts:
      - name: terraform-workspace
        mountPath: /app/terraform
        
      volumes:
      - name: terraform-workspace
        emptyDir: {}
