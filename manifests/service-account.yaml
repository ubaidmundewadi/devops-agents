apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-agent-sa
  namespace: default
  annotations:
    # Annotation for EKS IAM Roles for Service Accounts (IRSA)
    # Replace with your actual AWS IAM Role ARN that has Terraform permissions
    eks.amazonaws.com/role-arn: arn:aws:iam::520622116374:role/DevOpsAgentAccessRole
